/* ===== LANDING ===== */
#landing{
  position:relative;min-height:100vh;min-height:100svh;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:64px 24px;background:#241C17;
}
#landing .glyph{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-48%);
  font-family:'Shippori Mincho',serif;font-weight:700;
  font-size:min(58vw,440px);line-height:1;color:#332A24;z-index:0;
  user-select:none;pointer-events:none;
}
.cover{position:relative;z-index:1;max-width:680px;width:100%}
.cover__eyebrow{
  font-family:'Jost',sans-serif;font-size:11.5px;font-weight:400;letter-spacing:5px;
  text-transform:uppercase;color:#CBA964;margin-bottom:26px;
}
.cover__title{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(48px,12vw,92px);line-height:1;letter-spacing:1px;color:#F7EFDF;
}
.cover__arc{
  font-family:'Shippori Mincho',serif;font-size:clamp(15px,3.6vw,21px);
  letter-spacing:3px;color:#E0BE72;margin-top:20px;
}
.cover__dates{
  font-family:'Jost',sans-serif;font-size:12.5px;font-weight:300;letter-spacing:2.5px;
  text-transform:uppercase;color:#B6A88B;margin-top:12px;
}
.cover__rule{width:1px;height:48px;background:linear-gradient(#CBA964,transparent);margin:30px auto}
.cover__lead{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:#D6C9B0;margin-bottom:34px}

.choices{display:grid;gap:16px;max-width:520px;margin:0 auto}
@media(min-width:560px){.choices{grid-template-columns:1fr 1fr}}
.choice{
  position:relative;cursor:pointer;text-align:left;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(203,169,100,0.38);border-radius:5px;

.choice__meta{display:block;font-family:'Jost',sans-serif;font-size:12px;font-weight:300;letter-spacing:.4px;color:#B6A88B;margin-top:8px;line-height:1.5}
.choice__go{display:inline-block;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#E0BE72;margin-top:16px}
.cover__foot{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:#8D8069;margin-top:34px}

/* ===== VIEWER (holds a leg) ===== */
#viewer{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;background:#241C17}
#viewer.show{display:flex}
#viewer-bar{
  flex:0 0 auto;height:48px;display:flex;align-items:center;gap:12px;
  padding:0 6px 0 10px;background:#241C17;border-bottom:1px solid rgba(203,169,100,0.34);
}
#backbtn{
  display:inline-flex;align-items:center;gap:6px;cursor:pointer;
  background:none;border:none;color:#E0BE72;
  font-family:'Jost',sans-serif;font-size:11.5px;font-weight:500;letter-spacing:1.5px;
  text-transform:uppercase;padding:10px 10px;border-radius:4px;
}
#backbtn:hover{color:#F5ECDB}
#viewer-title{
  flex:1;text-align:center;font-family:'Shippori Mincho',serif;font-size:14px;
  color:#C8BA9C;letter-spacing:1.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#viewer-spacer{width:96px;flex:0 0 auto}
#frame-host{flex:1 1 auto;position:relative}
.legframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:#241C17}
.legframe.show{display:block}

<!-- ============ ITINERARY ============ -->
<section class="panel active" id="itinerary">
  <div class="hero">
    <div class="glyph">港</div>
    <div class="hero-inner">
      <div class="eyebrow">A Happy Camper Journey</div>
      <h1>The Browns<br><em>in Hong Kong</em></h1>
      <div class="dates">19 – 22 OCTOBER 2026</div>
      <div class="rule"></div>
      <p class="blurb">Three hosted days before Japan — an easy, delicious opening act for Aaron, Michelle, Josh and his partner, looked after by Tomoko and Gerhard.</p>
    </div>
    <div class="scrollcue">Scroll ↓</div>
  </div>

  <div class="sec-head reveal">
    <div class="kanji">食</div>
    <h2>Three Days at the Table</h2>
    <p>Four guests · two hosts · limousine and meet-and-greet throughout</p>
  </div>

  <div class="wrap">
    <div class="days">

      <!-- DAY 1 -->
      <div class="day reveal">
        <span class="num">一</span>
        <span class="date">Monday 19 October · Arrival</span>
        <span class="place">Touchdown in Hong Kong</span>
      </div>
      <div class="card reveal">
        <div class="meal">Lunch</div>
        <h3>Flower Drum <span class="cn">鋒膳</span></h3>
        <p>A hidden Cantonese kitchen tucked inside a Wan Chai residential block — you're buzzed in like a regular. Chef Nansen Lai cooks refined but playful "dip-tau-faan," sourcing globally: dry-aged Miyazaki pork-chop rice, the umami-rich "Soup of the Lord," char siu with silky Kyushu eggs. Insider, generous and deeply personal — a warm first lunch the moment you land.</p>
        <span class="badge b-confirm">Confirmed</span>
      </div>
      <div class="card reveal">
        <div class="meal">Dinner</div>
        <h3>The Chairman <span class="stars">★</span></h3>
        <p>Named the No. 1 restaurant in Asia for 2026 and Michelin-starred, Danny Yip's counter in Central is the benchmark for heritage Cantonese cooking — no theatrics, just exceptional sourcing from its own organic farm. The signature steamed flowery crab in aged Shaoxing wine is the stuff of legend. Quite possibly the single hardest table in the city, and an unforgettable first night.</p>
        <span class="badge b-reserve">Reserving</span>
      </div>

      <!-- DAY 2 -->
      <div class="day reveal">
        <span class="num">二</span>
        <span class="date">Tuesday 20 October</span>
        <span class="place">Island &amp; harbour</span>
      </div>
      <div class="card reveal">
        <div class="meal">Lunch</div>
        <h3>Yun <span class="cn">步雲</span></h3>
        <p>One of Hong Kong's hottest and hardest-to-book tables — an intimate, high-end Cantonese kitchen on Hollywood Road in Sheung Wan. Chef-driven and ingredient-led, it puts live wok-hei centre stage, plating classic Cantonese flavour with modern, creative precision. A coveted table, and one of the trip's standout lunches.</p>
        <span class="badge b-reserve">Reserving</span>
      </div>
      <div class="card reveal">
        <div class="meal">Dinner</div>
        <h3>SoftBank Private Kitchen</h3>
        <p>Essentially a friend's private chef space — normally kept for family and the inner circle, and a genuine "inside the velvet rope" evening. We secure it months ahead and ask the chef to hold the days on either side. Now secured for your evening, with an equally special alternative held in reserve.</p>
        <span class="badge b-confirm">Confirmed</span>
      </div>

      <!-- DAY 3 -->
      <div class="day reveal">
        <span class="num">三</span>
        <span class="date">Wednesday 21 October</span>
        <span class="place">A grand finale</span>
      </div>
      <div class="card reveal">
        <div class="meal">Lunch</div>
        <h3>Jockey Club</h3>
        <p>A members-only dim sum lunch at the Hong Kong Jockey Club — among the city's most exclusive institutions, where you come only as a member's guest. Steamer baskets of refined Cantonese dim sum in the hilltop clubhouses above Happy Valley racecourse: old-Hong-Kong grandeur and quiet privilege, and a glimpse few visitors ever get.</p>
        <span class="badge b-reserve">Reserving</span>
      </div>
      <div class="card reveal">

<script>
  // tabs
  var tabs=document.querySelectorAll('.tab');
  var panels=document.querySelectorAll('.panel');
  tabs.forEach(function(t){
    t.addEventListener('click',function(){
      tabs.forEach(function(x){x.classList.remove('active')});
      panels.forEach(function(p){p.classList.remove('active')});
      t.classList.add('active');
      document.getElementById(t.dataset.p).classList.add('active');
      window.scrollTo({top:0,behavior:'instant'});
      runReveal();
    });
  });

  // FX converter
  var R=7.84;
  var hkd=document.getElementById('hkd'), usd=document.getElementById('usd');
  function fromHkd(){var v=parseFloat(hkd.value);usd.value=isNaN(v)?'':(v/R).toFixed(2);}
  function fromUsd(){var v=parseFloat(usd.value);hkd.value=isNaN(v)?'':(v*R).toFixed(2);}
  hkd.addEventListener('input',fromHkd);
  usd.addEventListener('input',fromUsd);
  fromHkd();

  // scroll reveal
  var io=new IntersectionObserver(function(es){
    es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
  },{threshold:.12});
  function runReveal(){
    document.querySelectorAll('.panel.active .reveal:not(.in)').forEach(function(el){io.observe(el);});
  }
  runReveal();
<\/script>

  font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:1px;padding:10px 16px;border-radius:30px}
.feature__tip{margin-top:16px;font-style:italic;font-size:14px;color:#D9CBAC;line-height:1.55;padding-left:14px;border-left:1px solid rgba(197,163,90,0.35)}

/* utilities */
.util-title{font-size:20px;font-weight:500;color:#EFE5D1;letter-spacing:.4px;padding:16px 20px 0}
.fx{display:flex;gap:10px;align-items:flex-end;padding:14px 20px 6px}
.fx__group{flex:1}
.fx__lab{font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:#CCBE9E;margin-bottom:6px}
.fx__in{width:100%;padding:11px 13px;background:#302721;border:1px solid rgba(197,163,90,0.3);border-radius:4px;
  color:#F0E7D6;font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:500;outline:none}
.fx__in:focus{border-color:#C5A35A}
.fx__swap{width:40px;height:40px;border-radius:50%;flex-shrink:0;margin-bottom:2px;cursor:pointer;
  background:rgba(197,163,90,0.14);border:1px solid rgba(197,163,90,0.3);color:#DBB76A;font-size:17px}
.fx__rate{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.5px;color:#CCBE9E;text-align:center;padding:8px 20px 18px}
.ilist{list-style:none;padding:4px 20px 8px}
.ilist li{display:flex;gap:13px;padding:13px 0;border-bottom:1px solid rgba(197,163,90,0.1);font-size:16px;line-height:1.6}
.ilist li:last-child{border-bottom:none}
.ilist .em{font-size:18px;flex-shrink:0}
.ilist .tx{color:#EBE0CB}
.ilist .tx strong{display:block;color:#EBE1CC;font-weight:600;font-size:16px;letter-spacing:.3px;margin-bottom:1px}

/* contacts */
.contact{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid rgba(197,163,90,0.12)}
.contact:last-child{border-bottom:none}
.contact__l{display:flex;align-items:center;gap:13px;min-width:0}
.contact__ic{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:19px;background:rgba(197,163,90,0.13);border:1px solid rgba(197,163,90,0.25)}
.contact__nm{font-size:18px;font-weight:500;color:#EFE5D1;line-height:1.2}
.contact__sub{font-family:'Jost',sans-serif;font-size:11.5px;letter-spacing:.4px;color:#CCBE9E;margin-top:2px}
.callbtn{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;
  font-family:'Jost',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;
  padding:9px 16px;border-radius:30px;background:rgba(197,163,90,0.15);border:1px solid rgba(197,163,90,0.4);color:#E0C588}
.callbtn.sos{background:rgba(176,60,52,0.18);border-color:rgba(200,90,80,0.5);color:#E8A99F}
.pnote{font-size:15px;color:#D9CBAC;font-style:italic;line-height:1.6;text-align:center;padding:8px 10px 0}

/* reveal */
.reveal{opacity:0;transform:translateY(26px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}

@media (max-width:560px){
  .wrap{padding:0 20px}
  .hero__kanji{font-size:46vh}
  .stop__name{font-size:21px}
  .topbar__brand .label{display:none}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .reveal{opacity:1;transform:none}
  html{scroll-behavior:auto}
}
:focus-visible{outline:2px solid #DBB76A;outline-offset:3px;border-radius:2px}
</style>

<body>

<!-- ══════════ TOP BAR ══════════ -->
<header class="topbar">
  <div class="topbar__brand"><span class="jp">秋</span><span class="label">An Autumn Passage North</span></div>
  <nav class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="itinerary">Itinerary</button>
    <button class="tab-btn" data-tab="discover">Discover</button>
    <button class="tab-btn" data-tab="utilities">Utilities</button>
    <button class="tab-btn" data-tab="contacts">Contacts</button>
  </nav>
</header>

<!-- ══════════ ITINERARY ══════════ -->
<main id="itinerary" class="panel active">

  <section class="hero">
    <div class="hero__kanji">秋</div>
    <div class="hero__inner">
      <div class="hero__eyebrow">Niigata &amp; the North</div>
      <h1 class="hero__title">An Autumn<br>Passage <em>North</em></h1>
      <div class="hero__sub">越後の秋 · 食の旅</div>
      <div class="hero__meta">A Tokyo opening, then six days north<br>30 October – 6 November 2026</div>
      <div class="hero__rule"></div>
      <p class="hero__dedication">In welcome of <strong>Aaron &amp; Michelle Brown</strong><br>Hosted by <strong>Tomoko &amp; Gerhard</strong></p>
    </div>
  </section>

  <div class="wrap">

    <section class="intro reveal">
      <p class="intro__lead"><span class="drop">A</span> journey arranged around the table — Michelin counters, wood-fire kitchens and snow-country ryokan, strung along the roads and rice plains of Niigata as the maples turn.</p>
      <p class="intro__body">It opens in Tokyo over a three-star dinner, then runs north through Gunma and into Echigo: gorges and shrines, a craft town, a crossing to Sado, and a final lunch by the station before the journey home. A private car and driver carry the party throughout.</p>

      <div class="legend">
        <div class="legend__title">Reading the booking status</div>
        <div class="legend__row">
          <span class="legend__item"><span class="legend__dot dot-confirmed"></span>Confirmed</span>
          <span class="legend__item"><span class="legend__dot dot-reserving"></span>Reserving</span>
          <span class="legend__item"><span class="legend__dot dot-walkin"></span>Walk-in</span>
          <span class="legend__item"><span class="legend__dot dot-optional"></span>Optional</span>
          <span class="legend__item"><span class="legend__dot dot-visit"></span>Visit · no booking</span>
        </div>
      </div>
    </section>

    <!-- PROLOGUE -->
    <section class="chapter reveal">
      <div class="chapter__num">序</div>
      <div class="chapter__day">Prologue · Tokyo</div>
      <h2 class="chapter__title">A <em>three-star</em> opening</h2>
      <div class="chapter__route">東京 · 30 – 31 October</div>
    </section>
    <section class="stops reveal">
      <div class="stop stop--star">
        <div class="stop__key">Fri 30 Oct · Dinner <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name">Sazenka<span class="stop__jp">茶禅華</span></div>
        <div class="stop__loc">Minami-Azabu, Tokyo · 18:00 · 6 guests</div>
        <p class="stop__note"><span class="stop__stars">★★★</span> — Tokyo's three-star table, where Chinese technique is rewritten through a Japanese lens, chef Tomoya Kawada's idea of <em>wakon-kansai</em>. The trip is deliberately timed to its annual Shanghai hairy-crab menu, the autumn delicacy at its peak. A table of six, at six o'clock, to open the journey.</p>
      </div>
      <div class="stop">
        <div class="stop__key">Sat 31 Oct · At leisure <span class="badge b-optional">Optional</span></div>
        <div class="stop__name">A rest day in Tokyo</div>
        <div class="stop__loc">Recover from the journey over</div>
        <p class="stop__note">No fixed plans — time to settle in before heading north. A spa or traditional head spa, in the hotel or out, can be arranged on request whenever you'd like it.</p>
      </div>
    </section>

    <!-- DAY 1 -->
    <section class="chapter reveal">
      <div class="chapter__num">一</div>
      <div class="chapter__day">Day One · Sunday 1 Nov</div>
      <h2 class="chapter__title">Into the <em>snow country</em></h2>
      <div class="chapter__route">東京 → 魚沼</div>
      <span class="chapter__drive">Tokyo → Uonuma · approx 3 h 30</span>
    </section>
    <section class="stops reveal">
      <div class="stop">
        <div class="stop__key">Morning · Transfer <span class="badge b-reserving">Reserving</span></div>
        <div class="stop__name">North by private car</div>
        <div class="stop__loc">Tokyo → Gunma → Echigo</div>
        <p class="stop__note">Your car and driver for the week collect you in Tokyo and turn north, leaving the city behind for the rice plains and mountains of Gunma and Niigata.</p>
      </div>
      <div class="stop stop--star">
        <div class="stop__key">12:00 · Lunch <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=鮨おばな+館林+群馬" target="_blank" rel="noopener">Sushi Obana</a><span class="stop__jp">鮨おばな</span></div>
        <div class="stop__loc">Tatebayashi, Gunma · Sunday lunch only</div>
        <p class="stop__note">A quietly revered Edomae counter in rural Tatebayashi — a Tabelog Silver sushiya that opens its doors only for Sunday lunch. Hand-formed nigiri in the Tokyo tradition, well off the tourist map. That Sunday-only window is exactly why it anchors the first day.</p>
      </div>
      <div class="stop">
        <div class="stop__key">En route · Activity <span class="badge b-visit">Visit</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=少林山達磨寺+高崎" target="_blank" rel="noopener">Shōrinzan Daruma-ji</a><span class="stop__jp">少林山達磨寺</span></div>
        <div class="stop__loc">Takasaki, Gunma</div>
        <p class="stop__note">The hillside Zen temple that gave Japan the Takasaki daruma — the round, red, wish-granting doll made in the town below. A calm first stop in Gunma, the German architect Bruno Taut among its past residents.</p>
      </div>
      <div class="stop">
        <div class="stop__key">En route · Activity <span class="badge b-visit">Visit</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=富岡製糸場" target="_blank" rel="noopener">Tomioka Silk Mill</a><span class="stop__jp">富岡製糸場</span></div>
        <div class="stop__loc">Tomioka, Gunma · UNESCO World Heritage</div>
        <p class="stop__note">Japan's first modern silk-reeling mill, built in 1872 with French engineering and now a UNESCO World Heritage site. The long brick filature hall traces the country's leap into the industrial age, a fitting prelude to the craft days ahead.</p>
      </div>
      <div class="stop stop--star">
        <div class="stop__key">Evening · Stay &amp; Dinner <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=里山十帖+南魚沼" target="_blank" rel="noopener">Satoyama Jūjō</a><span class="stop__jp">里山十帖</span></div>
        <div class="stop__loc">Ōsawa Onsen, Minamiuonuma · 2 rooms · dinner 19:30</div>
        <p class="stop__note"><span class="stop__stars">★</span> Dinner is at the ryokan's Michelin-starred <strong>SANABURI</strong> (早苗饗) — vegetable- and wild-mountain-vegetable-forward cooking by a Kyoto Kichisen-trained chef, following the old seventy-two micro-seasons. The inn itself is a black-beamed farmhouse turned design landmark. Crossing the pass tonight balances the drives: today longer, tomorrow shorter.</p>
      </div>
    </section>

    <!-- DAY 2 -->
    <section class="chapter reveal">
      <div class="chapter__num">二</div>
      <div class="chapter__day">Day Two · Monday 2 Nov</div>
      <h2 class="chapter__title">Gorge, <em>cellar</em> &amp; duck</h2>
      <div class="chapter__route">魚沼 → 新潟の海辺</div>
      <span class="chapter__drive">Uonuma → coast · approx 2 h, broken by the gorge</span>
    </section>
    <section class="stops reveal">
      <div class="stop">
        <div class="stop__key">Morning · Activity <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=清津峡渓谷トンネル" target="_blank" rel="noopener">Kiyotsu Gorge — Tunnel of Light</a><span class="stop__jp">清津峡</span></div>
        <div class="stop__loc">Tokamachi · 08:30 entry · ~30 min from the ryokan</div>
        <p class="stop__note">One of Japan's three great gorges, its tunnel ending in the mirror-pool artwork — a centrepiece of the Echigo-Tsumari art field — that frames the cliffs and the autumn maples. Your timed slot is the first of the day, at peak foliage.</p>
        <div class="booking"><span class="tick">✓ Booked</span><span>“Echigo-Tsumari 2026” common pass · Tunnel of Light entry · 4 adults · 08:30, Mon 2 Nov · ref <span class="ref">155459XA6840</span><br><span style="color:#CCBE9E">QR tickets held in the ASOVIEW app</span></span></div>
      </div>
      <div class="stop">
        <div class="stop__key">Morning · Activity <span class="badge b-visit">Visit</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=八海山雪室+魚沼の里" target="_blank" rel="noopener">Hakkaisan Yukimuro</a><span class="stop__jp">八海山雪室</span></div>
        <div class="stop__loc">Uonuma-no-Sato, Minamiuonuma</div>
        <p class="stop__note">The "snow room" at the Hakkaisan brewery's countryside complex, where a thousand tonnes of winter snow hold the cellar at a steady chill to age sake through the year. A shop, café and tasting sit alongside — a short hop from last night's ryokan.</p>
      </div>
      <div class="stop">
        <div class="stop__key">Lunch <span class="badge b-walkin">Walk-in</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=八海山+宮野屋+そば+魚沼" target="_blank" rel="noopener">Miyanoya Soba</a><span class="stop__jp">八海山 宮野屋</span></div>
        <div class="stop__loc">Hakkaisan · Minamiuonuma</div>
        <p class="stop__note">Soba under the Hakkaisan name, on the brewery's home ground in the snow country. Hand-cut buckwheat and local mountain fare, with the brewery's water and rice all but underfoot — an easy, regional lunch before the drive to the coast.</p>
      </div>
      <div class="stop">
        <div class="stop__key">Afternoon · Activity <span class="badge b-visit">Visit</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=彌彦神社" target="_blank" rel="noopener">Yahiko Shrine</a><span class="stop__jp">彌彦神社</span></div>
        <div class="stop__loc">Yahiko, Niigata</div>
        <p class="stop__note">Niigata's most revered shrine at the foot of sacred Mt Yahiko, its wooded approach lit with maple colour at this time of year.</p>
      </div>
      <div class="stop">
        <div class="stop__key">Dinner <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=割烹+長吉+西蒲+新潟" target="_blank" rel="noopener">Kappou Chōkichi</a><span class="stop__jp">割烹 長吉</span></div>
        <div class="stop__loc">Nishikan, Niigata · BYOB welcome</div>
        <p class="stop__note">A country kappo famous well beyond Niigata for its wild duck — birds taken by net in the surrounding rice fields, the breast seared on a hot plate and finished in a deep duck-and-negi soup. Unpretentious, generous, and a short run from the night's ryokan; you're welcome to bring your own wine.</p>
      </div>
      <div class="stop">
        <div class="stop__key">Stay <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=著莪の里ゆめや+岩室温泉" target="_blank" rel="noopener">Shaga-no-Sato Yumeya</a><span class="stop__jp">著莪の里 ゆめや</span></div>
        <div class="stop__loc">Iwamuro Onsen · 2 rooms</div>
        <p class="stop__note">A small garden-onsen ryokan in the old spa village of Iwamuro — quiet rooms, private bathing and an unhurried night.</p>
      </div>
    </section>

    <!-- DAY 3 -->
    <section class="chapter reveal">
      <div class="chapter__num">三</div>
      <div class="chapter__day">Day Three · Tuesday 3 Nov</div>
      <h2 class="chapter__title">A day of <em>craft</em></h2>
      <div class="chapter__route">三条 · 燕三条のものづくり</div>
      <span class="chapter__drive">Culture Day · short hops around Sanjo · approx 1 h 35</span>
    </section>
    <section class="stops reveal">
      <div class="stop">
        <div class="stop__key">Morning · Coffee <span class="badge b-visit">Visit</span></div>
        <div class="stop__name"><a href="https://maps.app.goo.gl/DaAWidr3vK8UuKaE6?g_st=ic" target="_blank" rel="noopener">KKVEK Café</a></div>
        <div class="stop__loc">Sanjo – Tsubame craft belt</div>
        <p class="stop__note">A coffee stop to open the Culture Day, in the design-minded Sanjo–Tsubame district. A considered cup before the workshop visits begin. <a href="https://maps.app.goo.gl/DaAWidr3vK8UuKaE6?g_st=ic" target="_blank" rel="noopener" style="color:#C5A35A;border-bottom:1px solid rgba(197,163,90,.4)">View on the map →</a></p>
      </div>
      <div class="stop">
        <div class="stop__key">Morning · Workshop <span class="badge b-visit">Visit</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=マルナオ+三条" target="_blank" rel="noopener">Marunao — open factory</a><span class="stop__jp">マルナオ</span></div>
        <div class="stop__loc">Sanjo · open on the holiday</div>
        <p class="stop__note">The famed maker of precision chopsticks and tools in the Sanjo–Tsubame metalworking belt. A guided look at the workshop, open on the holiday — reserve a tour if you'd like one.</p>
      </div>
      <div class="stop">
        <div class="stop__key">Lunch <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.app.goo.gl/B4F3cUsoNjEDpubo7" target="_blank" rel="noopener">Restaurant Masa</a></div>
        <div class="stop__loc">Innovative French · Niigata · 12:00</div>
        <p class="stop__note">An innovative French kitchen turning Niigata's produce into a contemporary, course-led lunch — a refined midday table set between the morning's craft visits and the afternoon's sake. Booked for noon. <a href="https://maps.app.goo.gl/B4F3cUsoNjEDpubo7" target="_blank" rel="noopener" style="color:#C5A35A;border-bottom:1px solid rgba(197,163,90,.4)">View on the map →</a></p>
      </div>
      <div class="stop">
        <div class="stop__key">Afternoon · Activity <span class="badge b-visit">Visit</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=今代司酒造+新潟" target="_blank" rel="noopener">Imayotsukasa Sake Brewery</a><span class="stop__jp">今代司酒造</span></div>
        <div class="stop__loc">Niigata City · founded 1767</div>
        <p class="stop__note">A storied Niigata brewery, founded in 1767 and known today for all-koji brewing and one of the region's most welcoming cellar tours. A walk through the brewhouse and a tasting flight round out the day of craft before Tsukioka.</p>
      </div>
      <div class="stop stop--star">
        <div class="stop__key">Evening · Stay &amp; Dinner <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=別邸越の里+月岡温泉" target="_blank" rel="noopener">Bettei Koshi-no-Sato</a><span class="stop__jp">別邸 越の里</span></div>
        <div class="stop__loc">Tsukioka Onsen, Shibata · 2 suites</div>
        <p class="stop__note">An all-suite ryokan in Tsukioka's amber-tinted hot spring. Its kaiseki, taken in-house, leans on Shibata's farmland and the Sea of Japan. Suites, onsen and dinner together, with nothing to organise.</p>
      </div>
    </section>

    <!-- DAY 4 -->
    <section class="chapter reveal">
      <div class="chapter__num">四</div>
      <div class="chapter__day">Day Four · Wednesday 4 Nov</div>
      <h2 class="chapter__title">Shrine, <em>soba</em> &amp; the city</h2>
      <div class="chapter__route">月岡 → 阿賀野 → 新潟市</div>
      <span class="chapter__drive">Tsukioka → Niigata City · approx 1 h 20</span>
    </section>
    <section class="stops reveal">
      <div class="stop">
        <div class="stop__key">Morning · Activity <span class="badge b-visit">Visit</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=旦飯野神社+阿賀野" target="_blank" rel="noopener">Asaiino Shrine</a><span class="stop__jp">旦飯野神社</span></div>
        <div class="stop__loc">Agano, Niigata</div>
        <p class="stop__note">A serene, much-loved local shrine — a quiet start to the day, pairing naturally with the soba lunch a quarter-hour on.</p>
      </div>
      <div class="stop">
        <div class="stop__key">Lunch <span class="badge b-optional">Optional</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=手打ちそば鬼七+五泉" target="_blank" rel="noopener">Teuchi Soba Kishichi</a><span class="stop__jp">手打ちそば 鬼七</span></div>
        <div class="stop__loc">Gosen · no reservations · queue at 11:30</div>
        <p class="stop__note">A Michelin-listed soba house in Gosen with a mossy garden view, cutting its buckwheat by hand each morning. There are no reservations — the line forms at the 11:30 opening, where the driver can put your name down. Closed Mondays and the fourth Tuesday; today works.</p>
      </div>
      <div class="stop">
        <div class="stop__key">Afternoon · Stay <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=ホテル日航新潟" target="_blank" rel="noopener">Hotel Nikko Niigata</a><span class="stop__jp">ホテル日航新潟</span></div>
        <div class="stop__loc">Bandaijima · 2-night base (Nov 4 &amp; 5)</div>
        <p class="stop__note">A high tower on Bandaijima with wide views over the harbour and river mouth — your base for two nights, a short walk from the Sado jetfoil terminal.</p>
      </div>
      <div class="stop stop--star">
        <div class="stop__key">Dinner <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=兄弟寿し+古町+新潟" target="_blank" rel="noopener">Kyodai Sushi</a><span class="stop__jp">兄弟寿し</span></div>
        <div class="stop__loc">Furumachi, Niigata City · closed Sun</div>
        <p class="stop__note"><span class="stop__stars">★★</span> Two Michelin stars in the old geisha quarter of Furumachi — Niigata City's finest counter. Edomae craft applied to Sea-of-Japan fish, with the region's own rice and vinegar. A Wednesday seating works around its Sunday closure.</p>
      </div>
    </section>

    <!-- DAY 5 -->
    <section class="chapter reveal">
      <div class="chapter__num">五</div>
      <div class="chapter__day">Day Five · Thursday 5 Nov</div>
      <h2 class="chapter__title">A crossing to <em>Sado</em></h2>
      <div class="chapter__route">新潟 ⇄ 佐渡島</div>
      <span class="chapter__drive">Jetfoil · approx 67 min each way</span>
    </section>
    <section class="stops reveal">
      <div class="stop">
        <div class="stop__key">Morning · Crossing <span class="badge b-optional">Optional</span></div>

        <p class="stop__note">The fast jetfoil skims across to Sado in a little over an hour. A car or guide is arranged on the island for the day. The sea can cancel sailings in rough weather, so a mainland fallback is held in reserve.</p>

      <div class="stop">
        <div class="stop__key">Lunch <span class="badge b-optional">Optional</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=廻転寿司弁慶+佐渡本店" target="_blank" rel="noopener">Benkei Honten</a><span class="stop__jp">廻転寿司 弁慶</span> <span style="font-size:14px;color:#D9CBAC">/ Chozaburo</span></div>
        <div class="stop__loc">Sado · Benkei open Thu</div>
        <p class="stop__note">Sado's celebrated conveyor-sushi — the island's morning catch over 100% Sado Koshihikari rice. Famously good and famously good value, exactly the island lunch the day calls for. Benkei is open Thursday; Chozaburo (長三郎鮨) is the quieter alternative.</p>

        <div class="stop__key">Dinner <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name"><a href="https://maps.google.com/?q=宇呀+UGA+古町+新潟" target="_blank" rel="noopener">UGA</a><span class="stop__jp">宇呀</span></div>

        <p class="stop__note">An eight-seat wood-fire counter that opened late in 2025 — "port-town Niigata gastronomy" by chef Naoki Susa. Everything is cooked over open flame in one nightly seating at six, water, earth and fire as its theme. Hard to book, and worth booking first.</p>

        <div class="stop__key">Stay <span class="badge b-confirmed">Confirmed</span></div>
        <div class="stop__name">Hotel Nikko Niigata<span class="stop__jp">ホテル日航新潟</span></div>

<script>
(function(){
  'use strict';

  /* ── Tabs ── */
  var tabs=document.getElementById('tabs');
  tabs.addEventListener('click',function(e){
    var b=e.target.closest('.tab-btn'); if(!b) return;
    var name=b.getAttribute('data-tab');
    document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.toggle('active',x===b);});
    document.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('active',p.id===name);});
    window.scrollTo({top:0,behavior:'auto'});
  });

  /* ── Scroll reveal (itinerary) ── */
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(es){
      es.forEach(function(en){ if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);} });
    },{threshold:0.12,rootMargin:'0px 0px -8% 0px'});
    document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
  } else {
    document.querySelectorAll('.reveal').forEach(function(el){el.classList.add('in');});
  }

  /* ── FX converter ── */
  var RATE=160.6005; // 1 USD = JPY · source: planning canvas
  var j=document.getElementById('fx-jpy'), u=document.getElementById('fx-usd'), r=document.getElementById('fx-rate');
  r.textContent='Rate: 1 USD = '+RATE.toFixed(2)+' JPY · Source: planning canvas';
  function fromJ(){var v=parseFloat(j.value);u.value=isNaN(v)?'':(v/RATE).toFixed(2);}
  function fromU(){var v=parseFloat(u.value);j.value=isNaN(v)?'':String(Math.round(v*RATE));}
  j.addEventListener('input',fromJ); u.addEventListener('input',fromU);
  document.getElementById('fx-swap').addEventListener('click',function(){
    var t=j.value; j.value=u.value?String(Math.round(parseFloat(u.value)*RATE)):''; u.value=t?(parseFloat(t)/RATE).toFixed(2):'';
  });
  fromJ();
})();
<\/script>

<script>
(function(){
  'use strict';
  var TITLES={hk:'香港 · Hong Kong',jp:'日本 · Japan'};
  var host=document.getElementById('frame-host');
  var landing=document.getElementById('landing');
  var viewer=document.getElementById('viewer');
  var frames={};

  function decode(key){
    var raw=document.getElementById('doc-'+key).textContent;
    return raw.replace(/<\\\/script>/g,'<\/script>');
  }
  function build(key){
    var html=decode(key);
    var blob=new Blob([html],{type:'text/html'});
    var f=document.createElement('iframe');
    f.className='legframe';
    f.setAttribute('title',TITLES[key]);
    f.src=URL.createObjectURL(blob);
    host.appendChild(f);
    frames[key]=f;
  }
  function openLeg(key){
    if(!frames[key]) build(key);
    Object.keys(frames).forEach(function(k){frames[k].classList.toggle('show',k===key);});
    document.getElementById('viewer-title').textContent=TITLES[key];
    landing.style.display='none';
    viewer.classList.add('show');
    if(location.hash!=='#'+key){history.pushState({leg:key},'','#'+key);}
    window.scrollTo(0,0);
  }
  function showLanding(push){
    viewer.classList.remove('show');
    landing.style.display='';
    if(push && location.hash){history.pushState({},'',location.pathname+location.search);}
  }

  document.querySelectorAll('.choice').forEach(function(b){
    b.addEventListener('click',function(){openLeg(b.getAttribute('data-leg'));});
  });
  document.getElementById('backbtn').addEventListener('click',function(){history.back();});

  window.addEventListener('popstate',function(e){
    var key=(e.state&&e.state.leg)||((location.hash==='#hk'||location.hash==='#jp')?location.hash.slice(1):null);
    if(key){openLeg(key);} else {showLanding(false);}
  });

  if(location.hash==='#hk'||location.hash==='#jp'){openLeg(location.hash.slice(1));}
})();
</script>

</body>
</html>
